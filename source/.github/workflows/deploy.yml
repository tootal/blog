name: Sync
on: page_build
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
        with:
          source-repo: git@github.com:tootal/tootal.github.io.git
          destination-repo: git@gitee.com:tootal/tootal.git
      - name: Build Gitee Pages
        uses: yanglbme/gitee-pages-action@main
        with:
          gitee-username: tootal
          gitee-password: ${{ secrets.GT_PWD }}
          gitee-repo: tootal/tootal
          branch: master
      - name: Deploy static to Tencent CloudBase
        shell: bash
        run: |
          cd /home/runner/work/tootal.github.io/tootal.github.io/
          ls
          sudo npm i -g @cloudbase/cli
          tcb login --apiKeyId ${{ secrets.SECRET_ID }} --apiKey ${{ secrets.SECRET_KEY }}
          sudo rm -rf .git .github
          tcb hosting deploy . -e ${{ secrets.ENV_ID }} -r ap-guangzhou